name: Dreams CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PDF tooling
        run: sudo apt-get update && sudo apt-get install -y poppler-utils

      - name: Run artifact integrity checks
        run: python scripts/validate_artifacts.py

      - name: Build Zenodo bundle
        run: ./scripts/package_zenodo_bundle.sh
