<script>
(function(){
  var KEY='miragekit-theme',toggle=document.getElementById('themeToggle'),
      hamburger=document.getElementById('hamburgerBtn'),panel=document.getElementById('mobilePanel'),
      meta=document.getElementById('themeColorMeta');
  if(toggle)toggle.addEventListener('click',function(){
    var c=document.documentElement.dataset.theme,n=c==='dark'?'light':'dark';
    document.documentElement.dataset.theme=n;
    try{localStorage.setItem(KEY,n);}catch(e){}
    if(meta)meta.setAttribute('content',n==='dark'?'#111110':'#f5f2ec');
  });
  if(hamburger&&panel){
    hamburger.addEventListener('click',function(){
      panel.classList.toggle('open');
      hamburger.textContent=panel.classList.contains('open')?'✕':'☰';
    });
    panel.querySelectorAll('a').forEach(function(a){
      a.addEventListener('click',function(){panel.classList.remove('open');hamburger.textContent='☰';});
    });
  }
})();
</script>
